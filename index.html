<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5640814156029948"
     crossorigin="anonymous"></script>
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
        }

        main {
            width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
            background-color: black;
            color: white;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-weight: bolder;
            font-size: 40px;
            padding: 5px;
        }

        .conteiner-game {
            background-color: gray;
            padding: 10px;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: center;
            justify-items: center;
        }

        .box-game {
            padding: 30px;
            border: 5px solid rgb(197, 189, 189);
            border-radius: 10px;
        }

        .box-game a {
            font-family: fantasy;
            font-weight: bold;
            font-size: 24px;
            color: black;
        }

        /*HitNumber*/
        #box-hitnumber {
            background-color: #40E0D0;
        }

        #a-hitnumber {
            color: #C22C70;
        }
    </style>
</head>
<body>
    <header>

    </header>

    <main>
        <h1>JOGOS</h1>
        <div class="conteiner-game">
            <div id="box-hitnumber" class="box-game">
                <a id="a-hitnumber" href="https://andersonzero0.github.io/hitnumber/">Hit Number</a>
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>
</html>
